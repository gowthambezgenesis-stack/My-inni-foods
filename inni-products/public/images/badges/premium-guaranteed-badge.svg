<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="sealGlow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="45%" stop-color="#8B5A2B"/>
      <stop offset="100%" stop-color="#4A2C17"/>
    </radialGradient>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E6C8"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <circle cx="100" cy="100" r="88" fill="url(#sealGlow)" stroke="#F5E6C8" stroke-width="3"/>
    <circle cx="100" cy="100" r="72" fill="none" stroke="#F5E6C8" stroke-width="1.5" opacity="0.55"/>
    <rect x="38" y="88" width="124" height="24" rx="4" fill="url(#ribbon)" opacity="0.95"/>
    <text x="100" y="78" text-anchor="middle" fill="#FFF8E7" font-family="Georgia, serif" font-size="15" font-weight="700" letter-spacing="2">PREMIUM</text>
    <text x="100" y="105" text-anchor="middle" fill="#2A1608" font-family="Arial, sans-serif" font-size="10.5" font-weight="800" letter-spacing="1.2">GUARANTEED</text>
    <text x="100" y="122" text-anchor="middle" fill="#FFF8E7" font-family="Arial, sans-serif" font-size="9.5" font-weight="700" letter-spacing="1.8">INGREDIENTS</text>
  </g>
</svg>
