services:
  postgres:
    image: postgres:16
    container_name: inni-postgres
    environment:
      POSTGRES_DB: innifoods
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: innifoods:backend 
    container_name: inni-backend
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=postgres
      - DB_NAME=innifoods
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
      - DB_PORT=5432
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./inni-products
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://192.168.140.128:8000/api
    image: innifoods:frontend
    container_name: inni-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
